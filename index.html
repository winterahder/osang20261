  .av{width:34px;height:34px;font-size:14px}

let stuInfo={};
async function loadStuInfo(){
  try{
    const resp=await fetch('data/students.csv');
    if(!resp.ok)return;
    const text=await resp.text();
    const lines=text.replace(/^\uFEFF/,'').trim().split('\n');
    lines.slice(1).forEach(line=>{
      const parts=line.split(',');
      if(parts.length<3)return;
      const hak=parts[0].trim();
      stuInfo[hak]={school:parts[1].trim(),score:parts[2].trim(),avgPct:parts[5]?parts[5].trim():'',pctRank:parts[6]?parts[6].trim():''};
    });
    console.log(`학생 정보 ${Object.keys(stuInfo).length}명 로드 완료`);
  }catch(e){console.log('data/students.csv 로드 실패:',e);}
}
loadStuInfo();

const PHOTOS={};
function uploadPhotos(inp){
  Array.from(inp.files).forEach(f=>{
    const nm=f.name.replace(/\.[^.]+$/,'');
    const r=new FileReader();
    r.onload=e=>{
      PHOTOS[nm]=e.target.result;
      document.getElementById('photoCount').textContent=`📸 ${Object.keys(PHOTOS).length}명 등록됨`;
      // 현재 열려있는 카드가 이 학생이면 즉시 갱신
      if(curStuData&&curStuData.nm===nm)renderCard(curStuData);
    };
    r.readAsDataURL(f);
  });
}

function gc(g){return ACC[String(g)]||'#b02020';}
function accentColor(avg){
  const n=parseFloat(avg);
  if(n<=1.5)return'#0b8a5e';if(n<=2.5)return'#1060b0';if(n<=3.5)return'#4a3fa0';
  if(n<=4.5)return'#888780';if(n<=5.5)return'#c08000';return'#b02020';
}

Object.keys(ALL).sort((a,b)=>+a-+b).forEach(cls=>{  const btn=document.createElement('button');

const NAESIN_ITEMS=[
  {key:'mid1',label:'1학기 중간고사'},

  {key:'tot1',label:'1학기 종합성적'},
  {key:'mid2',label:'2학기 중간고사'},
  {key:'fin2',label:'2학기 기말고사'},
  {key:'tot2',label:'2학기 종합성적'},
];
/* ── 모의고사 항목 ── */
const MOCK_ITEMS=[
  {key:'mar',label:'3월'},
  {key:'jun',label:'6월'},
  {key:'sep',label:'9월'},
  {key:'nov',label:'11월'},
];

function selClass(cls){
  curCls=cls; curStu=null; curStuData=null; curCategory=null; curExam=null;
  document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('on',b.textContent===cls+'반'));

  const stuSec=document.getElementById('stuSection');
  stuSec.style.display='block';
  document.getElementById('stuLabel').textContent=cls+'반 · '+ALL[cls].length+'명';

  // 학생 목록
  document.getElementById('stuGrid').innerHTML=
    '<div class="stu-list">'+
    ALL[cls].map(s=>
      `<button class="sli" id="sb${s.n}" onclick="pick(${s.n})"><span class="sli-num">${s.n}</span><span class="sli-nm">${s.nm}</span></button>`
    ).join('')+
    '</div>';

  // 오른쪽: 내신/모의고사 버튼
  document.getElementById('navLabel').textContent='항목 선택';
  document.getElementById('navBtns').innerHTML=
    ['내신','모의고사'].map(cat=>
      `<button class="cb" onclick="selCategory('${cat}')">${cat}</button>`
    ).join('');
  document.getElementById('navSubBtnsWrap').style.display='none';
  document.getElementById('navSubBtns').innerHTML='';

  document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">학생 이름을 선택한 뒤 항목을 골라주세요</div></div>';
  stuSec.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function selCategory(cat){
  curCategory=cat; curExam=null;
  document.querySelectorAll('#navBtns .cb').forEach(b=>b.classList.toggle('on',b.textContent===cat));

  const items = cat==='내신' ? NAESIN_ITEMS : MOCK_ITEMS;
  const wrap=document.getElementById('navSubBtnsWrap');
  wrap.style.display='block';
  const isNaesin = cat==='내신';
  document.getElementById('navSubBtns').innerHTML= isNaesin
    ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">`+
      items.map(it=>`<button class="cb" style="text-align:center" onclick="selExam('${it.key}','${it.label}')">${it.label}</button>`).join('')+
      `</div>`
    : items.map(it=>`<button class="cb" onclick="selExam('${it.key}','${it.label}')">${it.label}</button>`).join('');

  document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">세부 항목을 선택해 주세요</div></div>';
}

function selExam(key,label){
  curExam=key;
  document.querySelectorAll('#navSubBtns .cb').forEach(b=>b.classList.toggle('on',b.textContent===label));

  const hasData = (curCategory==='모의고사' && key==='mar');

  // 학생 목록 갱신 (클릭 가능 여부 반영)
  const stuList = document.querySelector('#stuGrid .stu-list');
  if(stuList){
    stuList.querySelectorAll('.sli').forEach(btn=>{
      btn.disabled = !hasData;
      btn.style.opacity = hasData ? '' : '0.4';
      btn.style.cursor = hasData ? '' : 'default';
    });
  }

  if(hasData){
    if(curStu!==null && curStuData){
      tryShowCard();
    } else {
      document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">이름을 클릭하면 분석이 표시됩니다</div></div>';
    }
  } else {
    document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph" style="color:#c0bfb5">📋 '+label+' 데이터는 아직 준비 중입니다</div></div>';
  }
}

/* 학생 + 항목 둘 다 선택됐을 때 카드 렌더 */
function tryShowCard(){
  const hasData = (curCategory==='모의고사' && curExam==='mar');
  if(hasData && curStuData){
    renderCard(curStuData);
    document.getElementById('cardArea').scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function pick(n){
  if(curStu!==null){const p=document.getElementById('sb'+curStu);if(p)p.classList.remove('on');}
  curStu=n;
  document.getElementById('sb'+n).classList.add('on');
  const stu=ALL[curCls].find(s=>s.n===n);
  curStuData=stu;
  // 항목(카테고리+세부)까지 선택된 경우에만 카드 표시
  if(stu && curExam){
    tryShowCard();
  } else {
    document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">이제 아래에서 항목을 선택해 주세요</div></div>';
  }
  document.getElementById('cardArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderCard(stu){
  const sc=stu.sc||{};
  const sumDefs=[

    {key:'수학',gr:sc.mat&&sc.mat.gr,pct:sc.mat&&sc.mat.pct,hasPct:true},
    {key:'영어',gr:sc.eng&&sc.eng.gr,hasPct:false},
    {key:'한국사',gr:sc.hst&&sc.hst.gr,hasPct:false},
    {key:'사회',gr:sc.soc&&sc.soc.gr,pct:sc.soc&&sc.soc.pct,hasPct:true},
    {key:'과학',gr:sc.sci&&sc.sci.gr,pct:sc.sci&&sc.sci.pct,hasPct:true},
  ];
  const sumHtml=sumDefs.map(d=>{
    const g=d.gr||'-';const color=g!=='-'?gc(g):'#c0bfb5';
    return`<div class="sc">
      <div class="sn">${d.key}</div>
      <div class="sgr" style="color:${color}">${g}<span style="font-size:12px;font-weight:600">등급</span></div>
      <div class="spc" style="min-height:16px">${d.hasPct&&d.pct?'백분위 '+d.pct:''}</div>
    </div>`;
