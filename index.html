<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1학년 3월 모의고사 · 학생 능력치 분석</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif}
body{background:#f0efe9;min-height:100vh;padding:24px 16px}
.wrap{max-width:940px;margin:0 auto}
h1{font-size:20px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.sub{font-size:12px;color:#999890;margin-bottom:20px}
.panel{background:#fff;border-radius:14px;border:0.5px solid #dddcd4;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.plabel{font-size:11px;color:#999890;margin-bottom:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.cls-btns{display:flex;flex-wrap:wrap;gap:7px}
.cb{padding:8px 20px;border:0.5px solid #dddcd4;border-radius:22px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#666560;transition:all .15s}
.cb:hover{background:#f5f4ee;border-color:#aaa}
.cb.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.stu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sb{border:0.5px solid #dddcd4;border-radius:12px;background:#fff;cursor:pointer;text-align:left;transition:all .18s;width:100%;padding:14px 14px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden}
.sb::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,#d3d1c7);border-radius:12px 0 0 12px;transition:background .18s}
.sb:hover{background:#fafaf7;border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.sb.on{background:#1a1a18;border-color:#1a1a18;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.sb.on::before{background:rgba(255,255,255,.25)}
.sb-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.sb-name{font-size:15px;font-weight:700;color:#1a1a18;line-height:1.2}
.sb-num{font-size:11px;color:#999890;margin-top:2px}
.sb-rank{font-size:11px;font-weight:600;color:#999890;background:#f5f4ee;padding:3px 8px;border-radius:10px;white-space:nowrap}
.sb.on .sb-name,.sb.on .sb-num{color:#fff}
.sb.on .sb-rank{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.gr-badge{display:flex;flex-direction:column;align-items:center;padding:7px 4px 6px;border-radius:8px;background:#f5f4ee;transition:all .18s}
.gr-subj{font-size:10px;font-weight:600;color:#999890;margin-bottom:4px;letter-spacing:.2px}
.gr-num{font-size:22px;font-weight:800;line-height:1}
.sb.on .gr-badge{background:rgba(255,255,255,.1)}
.sb.on .gr-subj{color:rgba(255,255,255,.55)}
.sb.on .gr-num{color:#fff !important}
.gr1{color:#0b8a5e}.gr2{color:#1060b0}.gr3{color:#4a3fa0}.gr4{color:#666560}.gr5{color:#9a6200}.gr6,.gr7,.gr8,.gr9{color:#b02020}
.bg-gr1{background:#dff4ec}.bg-gr2{background:#dbeeff}.bg-gr3{background:#eae9fd}.bg-gr4{background:#f5f4ee}.bg-gr5{background:#fff3d6}.bg-gr6,.bg-gr7,.bg-gr8,.bg-gr9{background:#fce8e8}
.avg-bar-wrap{margin-top:2px}
.avg-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.avg-text{font-size:10px;color:#999890}
.avg-val{font-size:11px;font-weight:700;color:#1a1a18}
.avg-track{height:4px;background:#ebebde;border-radius:4px;overflow:hidden}
.avg-fill{height:4px;border-radius:4px;background:linear-gradient(90deg,#0b8a5e,#1060b0)}
.sb.on .avg-text{color:rgba(255,255,255,.5)}.sb.on .avg-val{color:#fff}.sb.on .avg-track{background:rgba(255,255,255,.15)}
.stu-list{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.sli{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .12s}
.sli:hover{background:#f5f4ee}
.sli.on{background:#1a1a18}
.sli-num{font-size:12px;color:#999890;width:22px;flex-shrink:0;text-align:right}
.sli-nm{font-size:14px;font-weight:600;color:#1a1a18}
.sli.on .sli-num{color:rgba(255,255,255,.45)}
.sli.on .sli-nm{color:#fff}

/* ── 상세 카드 ── */
.detail-card{background:#fff;border-radius:14px;border:0.5px solid #dddcd4;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-hd{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.av{width:50px;height:50px;border-radius:50%;background:#dbeeff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1060b0;flex-shrink:0}
.card-hd h2{font-size:20px;font-weight:700;color:#1a1a18}
.card-hd p{font-size:13px;color:#999890;margin-top:3px}

/* 인쇄 버튼 */
.print-btn{margin-left:auto;display:flex;align-items:center;gap:6px;padding:9px 18px;border:0.5px solid #dddcd4;border-radius:22px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#1a1a18;transition:all .15s;flex-shrink:0}
.print-btn:hover{background:#1a1a18;color:#fff;border-color:#1a1a18}
.print-btn svg{width:15px;height:15px;flex-shrink:0}

.rank-row{display:flex;gap:24px;margin-bottom:16px;padding:12px 18px;background:#f5f4ee;border-radius:10px;align-items:center}
.rk-label{font-size:11px;color:#999890;margin-bottom:3px}
.rk-val{font-size:18px;font-weight:700;color:#1a1a18}
.sum-row{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:18px}
.sc{background:#f5f4ee;border-radius:8px;padding:5px 3px;text-align:center}
.sc .sn{font-size:12px;color:#999890;margin-bottom:2px;font-weight:600}
.sc .sgr{font-size:26px;font-weight:800;line-height:1}
.sc .spc{font-size:11px;color:#999890;margin-top:2px}
.div-line{border-top:0.5px solid #ebebde;margin:16px 0}
.sec-title{font-size:12px;font-weight:700;color:#999890;margin-bottom:12px;letter-spacing:.6px;text-transform:uppercase}
.ss-sec{margin-bottom:14px}
.ss-hd{font-size:15px;font-weight:700;color:#1a1a18;margin-bottom:7px;display:flex;align-items:center;gap:7px;padding-left:10px}
.ss-hd-score{font-weight:500;font-size:12px;color:#999890}
.badge{font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px}
.bdS{background:#dff4ec;color:#0b8a5e}.bdA{background:#dbeeff;color:#1060b0}.bdB{background:#eae9fd;color:#4a3fa0}.bdC{background:#f5f4ee;color:#666560}.bdD{background:#fff3d6;color:#9a6200}.bdE{background:#fce8e8;color:#b02020}
.dom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.dom{background:#f5f4ee;border-radius:9px;padding:9px 10px}
.dn{font-size:14px;color:#666560;margin-bottom:5px;line-height:1.3;font-weight:500}
.bar-bg{background:#dddcd4;border-radius:3px;height:5px;margin-bottom:5px}
.bar-f{height:5px;border-radius:3px}
.bar-S{background:#0b8a5e}.bar-A{background:#1060b0}.bar-B{background:#4a3fa0}.bar-C{background:#888780}.bar-D{background:#c08000}.bar-E{background:#b02020}
.db{display:flex;justify-content:space-between;align-items:center}
.dsc{font-size:11px;color:#999890;font-weight:500}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.li{display:flex;align-items:center;gap:4px;font-size:12px;color:#999890}
.ld{width:9px;height:9px;border-radius:50%}
.sw-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.sw{border-radius:10px;padding:12px 14px}
.sw-s{background:#dff4ec;border:0.5px solid #a8dfc6}.sw-e{background:#fce8e8;border:0.5px solid #f0b8b8}
.sw-t{font-size:12px;font-weight:700;margin-bottom:6px}
.sw-s .sw-t{color:#0b8a5e}.sw-e .sw-t{color:#b02020}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:3px 8px;border-radius:10px}
.ts{background:#a8dfc6;color:#055c3a}.te{background:#f0b8b8;color:#7a1515}
.ph{text-align:center;padding:50px 20px;color:#c0bfb5;font-size:14px}
.ACC={};

/* ══ 인쇄 스타일 ══ */
@media print{
  @page{size:A4;margin:10mm 12mm}

  /* 카드 영역만 보이고 나머지 전부 숨김 */
  body{background:#fff !important;padding:0 !important;margin:0 !important}
  .wrap > h1,
  .wrap > .sub,
  #clsSection,
  #stuSection{display:none !important}

  /* wrap 자체도 여백 제거 */
  .wrap{max-width:100% !important;margin:0 !important;padding:0 !important}

  .detail-card{
    border:none !important;
    box-shadow:none !important;
    padding:0 !important;
    border-radius:0 !important;
    page-break-inside:avoid;
  }
  .print-btn{display:none !important}

  /* 요약 과목 카드 작게 */
  .sum-row{grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px}
  .sc{padding:6px 2px}
  .sc .sn{font-size:9px;margin-bottom:2px}
  .sc .sgr{font-size:18px}
  .sc .spc{font-size:9px;margin-top:2px}

  .rank-row{padding:7px 12px;margin-bottom:10px;border-radius:6px}
  .rk-label{font-size:9px}.rk-val{font-size:13px}

  .div-line{margin:6px 0}
  .sec-title{font-size:10px;margin-bottom:6px}

  /* 도메인 과목 제목 */
  .ss-hd{font-size:11px;margin-bottom:3px;padding-left:7px}
  .ss-hd-score{font-size:9px}
  .ss-sec{margin-bottom:6px}

  /* 도메인 카드 */
  .dom-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:3px}
  .dom{padding:4px 6px;border-radius:5px}
  .dn{font-size:8px;margin-bottom:2px}
  .bar-bg{height:3px;margin-bottom:2px}
  .bar-f{height:3px}
  .dsc{font-size:8px}
  .badge{font-size:8px;padding:1px 5px}

  .leg{gap:6px;margin-bottom:6px}
  .li{font-size:8px}.ld{width:7px;height:7px}

  .sw-row{gap:5px;margin-top:6px}
  .sw{padding:6px 8px;border-radius:6px}
  .sw-t{font-size:9px;margin-bottom:2px}
  .tag{font-size:8px;padding:2px 5px}

  .card-hd{margin-bottom:8px}
  .card-hd h2{font-size:15px}
  .av{width:34px;height:34px;font-size:14px}
}
</style>
</head>
<body>
<div class="wrap">
<h1>1학년 · 학생 능력치 분석</h1>
<p class="sub">2026학년도 · 256명 전체 · 내신 &amp; 모의고사 등급·백분위 + 문항별 영역 분석</p>

<div class="panel" id="clsSection">
  <div class="plabel">반 선택</div>
  <div class="cls-btns" id="clsBtns">
  <button class="cb" onclick="selClass('1')">1반</button>
  <button class="cb" onclick="selClass('2')">2반</button>
  <button class="cb" onclick="selClass('3')">3반</button>
  <button class="cb" onclick="selClass('4')">4반</button>
  <button class="cb" onclick="selClass('5')">5반</button>
  <button class="cb" onclick="selClass('6')">6반</button>
  <button class="cb" onclick="selClass('7')">7반</button>
  <button class="cb" onclick="selClass('8')">8반</button>
  <button class="cb" onclick="selClass('9')">9반</button>
  <button class="cb" onclick="selClass('10')">10반</button>
</div>
</div>

<div class="panel" id="stuSection" style="display:none">
  <div class="plabel" id="stuLabel"></div>
  <div style="display:flex;gap:16px;align-items:flex-start">
    <div id="stuGrid" style="flex:0 0 160px"></div>
    <div id="navArea" style="flex:1;border-left:1px solid #ebebde;padding-left:16px">
      <div class="plabel" id="navLabel" style="margin-bottom:10px"></div>
      <div class="cls-btns" id="navBtns"></div>
      <div id="navGradeWrap" style="margin-top:10px;display:none">
        <div class="cls-btns" id="navGradeBtns"></div>
      </div>
      <div id="navSubBtnsWrap" style="margin-top:10px;display:none">
        <div id="navSubBtns"></div>
      </div>
    </div>
  </div>
</div>

<div id="cardArea"><div class="detail-card"><div class="ph">위에서 반을 선택한 후 학생을 클릭하면<br>문항별 영역 분석이 표시됩니다</div></div></div>
</div>

<script>

let DN={}, ALL={};
/* ── 모의고사 JSON 로더 ── */
const MOCK_CACHE={};
async function loadMockData(key){
  if(MOCK_CACHE[key]) return MOCK_CACHE[key];
  try{
    const resp=await fetch('data/'+key+'.json');
    if(!resp.ok) return null;
    const data=await resp.json();
    MOCK_CACHE[key]=data;
    return data;
  }catch(e){ console.log('모의고사 데이터 로드 실패:',e); return null; }
}
/* ── 페이지 열자마자 3월 데이터 프리로딩 ── */
loadMockData('mock_mar');
const SO=['국어','수학','영어','한국사','사회','과학'];
const SC_COL={'국어':'#7f77dd','수학':'#378add','영어':'#1d9e75','한국사':'#ef9f27','사회':'#e24b4a','과학':'#5dcaa5'};
const ACC={'1':'#0b8a5e','2':'#1060b0','3':'#4a3fa0','4':'#888780','5':'#c08000','6':'#b02020','7':'#b02020','8':'#b02020','9':'#b02020'};

let curCls=null,curStu=null,curStuData=null,_printHtml='';
let curCategory=null,curGrade=null,curExam=null;

/* ── 반 버튼은 HTML에 직접 삽입됨 ── */
let stuInfo={};

/* ── 학생 정보 CSV 로더 (부가정보: 이름·학교·내신 등) ── */
async function loadStuInfo(){
  try{
    const resp=await fetch('data/students.csv');
    if(!resp.ok)return;
    const text=await resp.text();
    const lines=text.replace(/^\uFEFF/,'').trim().split('\n');
    lines.slice(1).forEach(line=>{
      const parts=line.split(',');
      if(parts.length<3)return;
      const hak=parts[0].trim();
      const cls=String(parseInt(hak.slice(1,3))||0);
      const num=parseInt(hak.slice(3,5))||0;
      stuInfo[hak]={
        school:parts[1].trim(),
        score:parts[2].trim(),
        _name:parts[3]?parts[3].trim():'',
        _cls:cls,
        _num:num,
        avgPct:parts[5]?parts[5].trim():'',
        pctRank:parts[6]?parts[6].trim():'',
        club:parts[7]?parts[7].trim():''
      };
    });
    console.log(`학생 정보 ${Object.keys(stuInfo).length}명 로드 완료`);
  }catch(e){console.log('students.csv 로드 실패(로컬 테스트 시 정상):',e);}
}
loadStuInfo();

/* ── 동아리 활동 데이터 로더 ── */
let clubData={};
async function loadClubData(){
  try{
    const resp=await fetch('data/club_2026.json');
    if(!resp.ok)return;
    const d=await resp.json();
    clubData=d.students||{};
    console.log('동아리 데이터 로드 완료:', Object.keys(clubData).length+'명');
  }catch(e){console.log('club_2026.json 로드 실패(로컬 정상):',e);}
}
loadClubData();

const PHOTOS={};
function uploadPhotos(inp){
  Array.from(inp.files).forEach(f=>{
    const nm=f.name.replace(/\.[^.]+$/,'');
    const r=new FileReader();
    r.onload=e=>{
      PHOTOS[nm]=e.target.result;
      document.getElementById('photoCount').textContent=`📸 ${Object.keys(PHOTOS).length}명 등록됨`;
      // 현재 열려있는 카드가 이 학생이면 즉시 갱신
      if(curStuData&&curStuData.nm===nm)renderCard(curStuData);
    };
    r.readAsDataURL(f);
  });
}

function dg(r){if(r>=.9)return'S';if(r>=.8)return'A';if(r>=.7)return'B';if(r>=.55)return'C';if(r>=.4)return'D';return'E';}
function gc(g){return ACC[String(g)]||'#b02020';}
function accentColor(avg){
  const n=parseFloat(avg);
  if(n<=1.5)return'#0b8a5e';if(n<=2.5)return'#1060b0';if(n<=3.5)return'#4a3fa0';
  if(n<=4.5)return'#888780';if(n<=5.5)return'#c08000';return'#b02020';
}

/* 반 버튼은 stuInfo 로더에서 생성 */

/* ── 내신 항목 ── */
const NAESIN_ITEMS=[
  {key:'mid1',label:'1학기 중간고사'},
  {key:'fin1',label:'1학기 기말고사'},
  {key:'tot1',label:'1학기 종합성적'},
  {key:'mid2',label:'2학기 중간고사'},
  {key:'fin2',label:'2학기 기말고사'},
  {key:'tot2',label:'2학기 종합성적'},
];
/* ── 모의고사 항목 ── */
const MOCK_ITEMS=[
  {key:'mar',label:'3월'},
  {key:'jun',label:'6월'},
  {key:'sep',label:'9월'},
  {key:'nov',label:'11월'},
];
/* ── 비교과 항목 ── */
const EXTRA_ITEMS=[
  {key:'club',label:'동아리'},
  {key:'dream',label:'드림포스터'},
  {key:'study',label:'학력증진프로그램'},
];

function selClass(cls){
  curCls=cls; curStu=null; curStuData=null; curCategory=null; curExam=null; curMockKey=null;

  // 반 버튼 활성화
  document.querySelectorAll('#clsBtns .cb').forEach(b=>b.classList.toggle('on',b.textContent===cls+'반'));

  // 학생 패널 표시
  const stuSec=document.getElementById('stuSection');
  stuSec.style.display='block';

  // 학생 목록 구성
  function buildStuList(){
    if(ALL[cls]&&ALL[cls].length){
      return ALL[cls].map(s=>
        `<button class="sli" id="sb${s.n}" onclick="pick(${s.n})"><span class="sli-num">${s.n}</span><span class="sli-nm">${s.nm}</span></button>`
      ).join('');
    }
    const fromCsv=Object.values(stuInfo).filter(v=>v._cls===cls).sort((a,b)=>a._num-b._num);
    if(fromCsv.length){
      return fromCsv.map(s=>
        `<button class="sli" id="sb${s._num}" onclick="pick(${s._num})"><span class="sli-num">${s._num}</span><span class="sli-nm">${s._name}</span></button>`
      ).join('');
    }
    return Array.from({length:28},(_,i)=>
      `<button class="sli" id="sb${i+1}" onclick="pick(${i+1})"><span class="sli-num">${i+1}</span><span class="sli-nm">-</span></button>`
    ).join('');
  }

  const cnt=(ALL[cls]&&ALL[cls].length)||Object.values(stuInfo).filter(v=>v._cls===cls).length||'?';
  document.getElementById('stuLabel').textContent=cls+'반 · '+cnt+'명';
  document.getElementById('stuGrid').innerHTML='<div class="stu-list">'+buildStuList()+'</div>';

  // 오른쪽 항목 선택 패널 초기화
  document.getElementById('navLabel').textContent='항목 선택';
  document.getElementById('navBtns').innerHTML=
    ['내신','모의고사','비교과'].map(cat=>
      `<button class="cb" onclick="selCategory('${cat}')">${cat}</button>`
    ).join('');
  document.getElementById('navGradeWrap').style.display='none';
  document.getElementById('navGradeBtns').innerHTML='';
  document.getElementById('navSubBtnsWrap').style.display='none';
  document.getElementById('navSubBtns').innerHTML='';

  document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">학생 이름을 선택한 뒤 항목을 골라주세요</div></div>';
  stuSec.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function selCategory(cat){
  curCategory=cat; curGrade=null; curExam=null;
  document.querySelectorAll('#navBtns .cb').forEach(b=>b.classList.toggle('on',b.textContent===cat));

  // 학년 버튼 표시
  document.getElementById('navGradeWrap').style.display='block';
  document.getElementById('navGradeBtns').innerHTML=
    ['1학년','2학년','3학년'].map(g=>
      `<button class="cb" onclick="selGrade('${g}')">${g}</button>`
    ).join('');

  // 세부항목 숨기기
  document.getElementById('navSubBtnsWrap').style.display='none';
  document.getElementById('navSubBtns').innerHTML='';
  document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">학년을 선택해 주세요</div></div>';
}

function selGrade(grade){
  curGrade=grade; curExam=null;
  document.querySelectorAll('#navGradeBtns .cb').forEach(b=>b.classList.toggle('on',b.textContent===grade));

  const items = curCategory==='내신' ? NAESIN_ITEMS : curCategory==='모의고사' ? MOCK_ITEMS : EXTRA_ITEMS;
  const isNaesin = curCategory==='내신';
  document.getElementById('navSubBtnsWrap').style.display='block';
  document.getElementById('navSubBtns').innerHTML= isNaesin
    ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">`+
      items.map(it=>`<button class="cb" style="text-align:center" onclick="selExam('${it.key}','${it.label}')">${it.label}</button>`).join('')+
      `</div>`
    : items.map(it=>`<button class="cb" onclick="selExam('${it.key}','${it.label}')">${it.label}</button>`).join('');

  document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">세부 항목을 선택해 주세요</div></div>';
}

/* 현재 로딩된 모의고사 데이터 키 */
let curMockKey=null;

async function selExam(key,label){
  curExam=key;
  document.querySelectorAll('#navSubBtns .cb').forEach(b=>b.classList.toggle('on',b.textContent===label));

  // 모의고사 데이터 파일 키 계산
  const fileMap={'mar':'mock_mar','jun':'mock_jun','sep':'mock_sep','nov':'mock_nov'};
  const isMock = curCategory==='모의고사' && curGrade==='1학년';
  const isExtra = curCategory==='비교과';
  const fileKey = isMock ? fileMap[key] : null;

  // 비교과 처리
  if(isExtra){
    if(key==='club'){
      // 동아리: 학생 카드에 이미 표시됨 → 현재 선택 학생 카드 보여주기
      curMockKey='club';
      const stuList=document.querySelector('#stuGrid .stu-list');
      if(stuList) stuList.querySelectorAll('.sli').forEach(btn=>{btn.disabled=false;btn.style.opacity='';btn.style.cursor='';});
      if(curStu!==null && curStuData){
        renderClubCard(curStuData);
        document.getElementById('cardArea').scrollIntoView({behavior:'smooth',block:'nearest'});
      } else {
        document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">이름을 클릭하면 동아리 정보가 표시됩니다</div></div>';
      }
    } else {
      curMockKey=null;
      document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph" style="color:#c0bfb5">📋 '+label+' 데이터는 아직 준비 중입니다</div></div>';
    }
    return;
  }

  if(fileKey){
    document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">⏳ 데이터 불러오는 중...</div></div>';
    const data = await loadMockData(fileKey);
    if(data){
      // 전역 DN, ALL 업데이트
      DN=data.DN; ALL=data.ALL; curMockKey=fileKey;
      // 학생 목록 활성화
      const stuList=document.querySelector('#stuGrid .stu-list');
      if(stuList) stuList.querySelectorAll('.sli').forEach(btn=>{btn.disabled=false;btn.style.opacity='';btn.style.cursor='';});
      // curStu가 있으면 새로 로딩된 ALL에서 학생 데이터 다시 찾기
      if(curStu!==null && ALL[curCls]){
        const freshStu=ALL[curCls].find(s=>s.n===curStu);
        if(freshStu){ curStuData=freshStu; }
      }
      if(curStu!==null && curStuData){
        tryShowCard();
      } else {
        document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">이름을 클릭하면 분석이 표시됩니다</div></div>';
      }
    } else {
      document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph" style="color:#c0bfb5">📋 '+label+' 데이터는 아직 준비 중입니다</div></div>';
    }
  } else {
    curMockKey=null;
    const stuList=document.querySelector('#stuGrid .stu-list');
    if(stuList) stuList.querySelectorAll('.sli').forEach(btn=>{btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='default';});
    document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph" style="color:#c0bfb5">📋 '+label+' 데이터는 아직 준비 중입니다</div></div>';
  }
}

/* 학생 + 항목 둘 다 선택됐을 때 카드 렌더 */
function tryShowCard(){
  if(curMockKey && curStuData){
    if(curMockKey!=='club'){
      // 모의고사: ALL에서 학생 데이터 최신화
      const fresh=ALL[curCls]&&ALL[curCls].find(s=>s.n===curStuData.n);
      if(fresh){ curStuData=fresh; }
    }
    renderCard(curStuData);
    document.getElementById('cardArea').scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function pick(n){
  if(curStu!==null){const p=document.getElementById('sb'+curStu);if(p)p.classList.remove('on');}
  curStu=n;
  document.getElementById('sb'+n).classList.add('on');
  const stu=(ALL[curCls]&&ALL[curCls].find(s=>s.n===n))||null;
  curStuData=stu;
  // 항목(카테고리+세부)까지 선택된 경우에만 카드 표시
  if(stu && curExam){
    if(curMockKey==='club'){
      renderClubCard(stu);
      document.getElementById('cardArea').scrollIntoView({behavior:'smooth',block:'nearest'});
    } else {
      tryShowCard();
    }
  } else {
    document.getElementById('cardArea').innerHTML='<div class="detail-card"><div class="ph">이제 아래에서 항목을 선택해 주세요</div></div>';
  }
  document.getElementById('cardArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

        <img src="${pSrc}"
          style="width:108px;height:144px;border-radius:8px;object-fit:cover;object-position:top;border:1px solid #e8e7e0;display:block"
          onerror="if(this.src.endsWith('.jpg')){this.src=this.src.replace('.jpg','.jpeg')}else if(this.src.endsWith('.jpeg')){this.src=this.src.replace('.jpeg','.png')}else{this.outerHTML='<div style=\\'width:108px;height:144px;border-radius:8px;background:#dbeeff;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:700;color:#1060b0\\'>${stu.nm[0]}</div>'}"
        >
        <div style="display:flex;gap:4px;margin-top:6px">
          <div style="flex:1;text-align:center;background:#f5f4ee;border-radius:7px;padding:4px 2px">
            <div style="font-size:9px;color:#999890">등급평균</div>
            <div style="font-size:15px;font-weight:800;color:#1a1a18">${sc.avg||'-'}</div>
          </div>
          <div style="flex:1;text-align:center;background:#f5f4ee;border-radius:7px;padding:4px 2px">
            <div style="font-size:9px;color:#999890">교내석차</div>
            <div style="font-size:15px;font-weight:800;color:#1a1a18">${sc.rank?sc.rank+'위':'-'}</div>
          </div>
        </div>
        ${info.pctRank?`<div style="display:flex;gap:4px;margin-top:4px">
          <div style="flex:1;text-align:center;background:#dbeeff;border-radius:7px;padding:4px 2px">
            <div style="font-size:9px;color:#1060b0;font-weight:600">평균백분위</div>
            <div style="font-size:14px;font-weight:800;color:#1060b0">${info.avgPct}</div>
          </div>
          <div style="flex:1;text-align:center;background:#dbeeff;border-radius:7px;padding:4px 2px">
            <div style="font-size:9px;color:#1060b0;font-weight:600">백분위석차</div>
            <div style="font-size:15px;font-weight:800;color:#1060b0">${info.pctRank}위</div>
          </div>
        </div>`:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:20px;font-weight:700;color:#1a1a18">${stu.nm} <span style="font-weight:500;font-size:14px;color:#999890">${curCls}반 ${stu.n}번</span></div>
            <div style="font-size:12px;color:#999890;margin-top:3px">2026년 3월 전국연합학력평가</div>
            ${info.school?`<div style="display:flex;gap:8px;margin-top:5px;align-items:center;flex-wrap:wrap">
              <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#555450;background:#f5f4ee;border-radius:6px;padding:3px 8px;font-weight:500">🏫 ${info.school}</span>
              <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#555450;background:#f5f4ee;border-radius:6px;padding:3px 8px;font-weight:500">📋 내신 ${info.score}</span>
              ${info.club?`<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#0b6e4f;background:#dff4ec;border-radius:6px;padding:3px 8px;font-weight:500">🎯 ${info.club}</span>`:''}
            </div>`:''}
          </div>
          <button class="print-btn" onclick="printCard()" style="margin-left:10px;flex-shrink:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8"/>
            </svg>
            인쇄
          </button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-left:48px">
          ${sumHtml}
        </div>
      </div>
    </div>
    <div class="div-line"></div>
    <div class="sec-title">문항별 영역 분석</div>
    <div class="leg">
      <span class="li"><span class="ld" style="background:#0b8a5e"></span>S 90%+</span>
      <span class="li"><span class="ld" style="background:#1060b0"></span>A 80~89%</span>
      <span class="li"><span class="ld" style="background:#4a3fa0"></span>B 70~79%</span>
      <span class="li"><span class="ld" style="background:#888780"></span>C 55~69%</span>
      <span class="li"><span class="ld" style="background:#c08000"></span>D 40~54%</span>
      <span class="li"><span class="ld" style="background:#b02020"></span>E ~39%</span>
    </div>
    ${subjHtml}
    <div class="sw-row">
      <div class="sw sw-s"><div class="sw-t">강점 영역 (S·A)</div><div class="tags">${strong||'<span style="font-size:11px;color:#666">해당 없음</span>'}</div></div>
      <div class="sw sw-e"><div class="sw-t">집중 보완 필요 (E·D)</div><div class="tags">${weak||'<span style="font-size:11px;color:#666">해당 없음</span>'}</div></div>
    </div>
  </div>`;
}
</script>
</body>
</html>
